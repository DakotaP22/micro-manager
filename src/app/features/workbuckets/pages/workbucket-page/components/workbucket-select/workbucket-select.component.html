<span class="workbucket-select" [matMenuTriggerFor]="menu">
  <h1 class="mat-headline-4">{{ name() }}</h1>

  @if(availableBuckets().length > 0) {
    <mat-icon
      aria-hidden="false"
      aria-label="Workbucket selection dropdown"
      fontIcon="expand_more"
    ></mat-icon>
  }
</span>

<mat-menu #menu="matMenu">
  @for(bucket of filteredBuckets(); track bucket) {
  <button mat-menu-item (click)="onBucketClick(bucket.id)">{{ bucket.name }}</button>
  }
</mat-menu>
