<main class="login-card surface-2">
  <h1 class="title mat-headline-3">Sign In</h1>

  <form class="login-form" [formGroup]="loginForm">
    <mat-form-field class="email">
      <mat-label>Email</mat-label>
      <input id="email" matInput type="email" formControlName="email"/>
    </mat-form-field>

    <mat-form-field class="password">
      <mat-label>Password</mat-label>
      <input id="password" matInput type="password" formControlName="password" />
    </mat-form-field>

    <mat-checkbox class="remember-me"  formControlName="rememberMe">Remember me</mat-checkbox>

    <a class="forgot-password mat-body" [routerLink]="['/reset-password']">
      Forgot Password?
    </a>

    <button mat-raised-button color="primary" class="login-btn" (click)="onLoginClick()">Sign In</button>

    <div class="divider">or</div>

    <a
      mat-raised-button
      color="accent"
      class="register-btn link-btn"
      [routerLink]="['/register']"
    >
      Create Account
    </a>
  </form>
</main>
