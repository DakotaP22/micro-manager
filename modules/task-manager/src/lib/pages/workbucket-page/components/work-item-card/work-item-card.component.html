<span>
	<p class="mat-subtitle-1">{{ workItem?.title }}</p>
	<p class="details">? Tasks Complete</p>
</span>

<span class="spacer">&nbsp;</span>

<span class="data-column">
	<p class="mat-subtitle-1">Complexity</p>
	<p class="details">{{ workItem?.complexity }}</p>
</span>

<span class="data-column">
	<p class="mat-subtitle-1">Priority</p>
	<p class="details">{{ workItem?.priority }}</p>
</span>

<span class="data-column">
	<p class="mat-subtitle-1">Due Date</p>
	<p class="details">{{ workItem?.dueDate | date : 'shortDate' }}</p>
</span>

<span class="menu">
	<mat-icon
		class="menu-icon"
		[matMenuTriggerFor]="menu"
		(click)="$event.stopPropagation()"
		>more_vert</mat-icon
	>
	<mat-menu #menu="matMenu">
		<button mat-menu-item>Edit</button>
		<button mat-menu-item>Delete</button>
	</mat-menu>
</span>
