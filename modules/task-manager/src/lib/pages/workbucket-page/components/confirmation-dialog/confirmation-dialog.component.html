<h2 mat-dialog-title>Are you sure you want to do that?</h2>
<mat-dialog-content
	>{{ data.description }}</mat-dialog-content
>
<mat-dialog-actions class="actions">
	<button mat-button mat-dialog-close>Cancel</button>
	<button
		mat-raised-button
		[color]="data.warn ? 'warn' : 'primary'"
		[mat-dialog-close]="true"
	>
		{{ data.action }}
	</button>
</mat-dialog-actions>
