<div class="content">
	<p class="mat-subtitle-1 title">{{ workbucket?.title }}</p>
	<p class="mat-body-2 open-item-count">
		{{ workbucket?.openItems }} open items
	</p>
</div>

<mat-icon class="menu-icon" [matMenuTriggerFor]="menu">more_vert</mat-icon>
<mat-menu #menu="matMenu">
	<button mat-menu-item (click)="edit.next()">Edit Bucket</button>
	<button mat-menu-item (click)="archive.next()">Archive Bucket</button>
	<button mat-menu-item (click)="delete.next()">Delete Bucket</button>
</mat-menu>
