<section class="surface-3 layout">
	@defer(when bucketQuery.isFetched()) {
	<h2 class="mat-headline-2 title">{{ bucketQuery.data()?.title }}</h2>

	@if(bucketQuery.data()?.description; as description) {
	<p class="mat-headline-6 description">{{ description }}</p>
	}

	<section class="work-item-list">
		<work-item-table />
	</section>

	<button mat-raised-button color="primary" class="action-btn" (click)="routeToCreateWorkItem()">Add Work Item</button>
	} @placeholder {
	<p>Loading Details...</p>
	}
</section>
