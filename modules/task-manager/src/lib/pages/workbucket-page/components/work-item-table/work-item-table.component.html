@if(sortedWorkItems().length > 0) {

<table
	mat-table
	[dataSource]="sortedWorkItems()"
	class="mat-elevation-z8"
	matSort
	(matSortChange)="onSortChange($event)"
	#table
>
	<!-- Title Column -->
	<ng-container matColumnDef="title">
		<th mat-header-cell *matHeaderCellDef mat-sort-header>Title</th>
		<td mat-cell *matCellDef="let element">{{ element.title }}</td>
	</ng-container>

	<!-- priority Column -->
	<ng-container matColumnDef="priority">
		<th mat-header-cell *matHeaderCellDef mat-sort-header>Priority</th>
		<td mat-cell *matCellDef="let element">{{ element.priority }}</td>
	</ng-container>

	<!-- complexity Column -->
	<ng-container matColumnDef="complexity">
		<th mat-header-cell *matHeaderCellDef mat-sort-header>Complexity</th>
		<td mat-cell *matCellDef="let element">{{ element.complexity }}</td>
	</ng-container>

	<!-- dueDate Column -->
	<ng-container matColumnDef="dueDate">
		<th mat-header-cell *matHeaderCellDef mat-sort-header>Due Date</th>
		<td mat-cell *matCellDef="let element">{{ element.dueDate | date : 'longDate' }}</td>
	</ng-container>

	<tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
	<tr mat-row *matRowDef="let row; columns: displayedColumns" class="data-row"></tr>
</table>

}
