
@defer(when !isLoading()) { 
  @if(bucketCount() > 0) {
    <main class="buckets-layout">
      <div class="bucket-list">
        <h1 class="mat-headline-2">Buckets</h1>

        <workbucket-card-list />

        <button mat-stroked-button color="primary" (click)="onCreateBucketClick()">Add Bucket</button>
      </div>

      <div class="bucket-details">{{selectedBucket() | json}}</div>
    </main>
    } @else {
    <no-buckets />
    } 
} @placeholder {}
