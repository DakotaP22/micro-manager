
@defer(when state.isSettled()) { 
  @if(state.bucketCount() > 0) {
    <main class="buckets-layout">
      <div class="bucket-list">
        <h1 class="mat-headline-2">Buckets</h1>

        <workbucket-card-list />

        <button mat-stroked-button color="primary" (click)="navigateToCreateBucketPage()">Add Bucket</button>
      </div>

      <!-- <div class="bucket-details">{{state.selectedBucket() | json}}</div> -->
      <workbucket-details [bucketId]="state.selectedBucketId()"/>
    </main>
    } @else {
    <no-buckets (createBucket)="navigateToCreateBucketPage()"/>
    } 
}
