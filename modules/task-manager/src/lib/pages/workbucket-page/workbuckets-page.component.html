
@defer(when !pageSvc.state().loading) {
  @if(pageSvc.state.bucketCount() > 0) {
    <main class="buckets-layout">
      <div class="bucket-list">
        <h1 class="mat-headline-2">Buckets</h1>
    
        <ul class="buckets">
    
          @for(bucket of pageSvc.state().workbuckets; track bucket.id) {
            <workbucket-card 
              [workbucket]="bucket" 
              [class.active]="pageSvc.state().selectedWorkbucketId === bucket.id"
              (click)="onBucketClick(bucket)"
              (delete)="onDeleteBucket(bucket.id)"
              (archive)="onArchiveBucket(bucket.id)" 
            />
          }
    
        </ul>
    
        <button mat-stroked-button color="primary">Add Bucket</button>
      </div>
    
      <div class="bucket-details">details</div>
    </main>
    } @else {
    <no-buckets />
    }
} @placeholder {

}
