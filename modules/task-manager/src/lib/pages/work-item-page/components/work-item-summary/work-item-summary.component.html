<div class="tab-content-wrapper">
	<p class="description mat-headline-6">{{ description() }}</p>

	<ul>
		<li>
			<h6 class="mat-headline-6">External Tracking ID:</h6>
			<p class="mat-headline-6">{{ externalTrackingId() }}</p>
		</li>
		<li>
			<h6 class="mat-headline-6">Priority:</h6>
			<p class="mat-headline-6">{{ priority() }}</p>
		</li>
		<li>
			<h6 class="mat-headline-6">Complexity:</h6>
			<p class="mat-headline-6">{{ complexity() }}</p>
		</li>
		<li>
			<h6 class="mat-headline-6">Due Date:</h6>
			@if(dueDate(); as dueDate) {
			<p class="mat-headline-6">{{ dueDate | date : 'shortDate' }}</p>
			} @else {
			<p class="mat-headline-6">Unknown</p>
			}
		</li>
	</ul>
</div>

<span class="action-btn-wrapper">
	<button mat-fab extended color="accent" class="action-btn">Update Work Item</button>
</span>
